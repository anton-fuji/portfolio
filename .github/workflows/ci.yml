name: CI
permissions: {}

defaults:
  run:
    shell: bash

on:
  push:
    branches:  
        - main 
    paths:
        - 'src/**'
        - 'package.json'
        - 'package-lock.json'
        - '.npmrc'
        - '.github/**'
        - 'vite.config.ts'
        - 'tsconfig*.json'
        - 'biome.json'
  pull_request:
    branches:
        - main
    paths:
        - 'src/**'
        - 'package.json'
        - 'package-lock.json'
        - '.npmrc'
        - '.github/**'
        - 'vite.config.ts'
        - 'tsconfig*.json'
        - 'biome.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor != 'renovate[bot]'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup dependencies
        uses: ./.github/actions/setup

      - parallel:
          - name: Lint
            run: npm run lint

          - name: Build & Type-Check
            run: npm run build
