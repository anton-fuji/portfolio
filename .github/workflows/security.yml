name: Security

on:
  pull_request:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.npmrc'
      - '.github/**'
      - 'renovate.json'
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.npmrc'
      - '.github/**'
      - 'renovate.json'
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  osv-scan:
    name: OSV Scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=package-lock.json
